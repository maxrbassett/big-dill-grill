<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="The Big Dill Grill pickle mascot">
  <circle cx="32" cy="32" r="32" fill="#426528"/>
  <circle cx="32" cy="32" r="27" fill="#557d34"/>
  <!-- pickle body -->
  <ellipse cx="32" cy="36" rx="13" ry="19" fill="#6f9d49"/>
  <ellipse cx="32" cy="36" rx="13" ry="19" fill="none" stroke="#34501f" stroke-width="1.4"/>
  <!-- bumps/highlight -->
  <g fill="#91b86f">
    <circle cx="27" cy="28" r="2"/>
    <circle cx="35" cy="33" r="2.2"/>
    <circle cx="29" cy="42" r="2.4"/>
    <circle cx="36" cy="46" r="1.8"/>
  </g>
  <!-- sunglasses -->
  <g fill="#283d18">
    <rect x="23" y="30" width="7.5" height="5" rx="2.2"/>
    <rect x="33.5" y="30" width="7.5" height="5" rx="2.2"/>
